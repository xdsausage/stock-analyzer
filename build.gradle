plugins {
    id 'java'
    id 'application'
}

group = 'com.stockanalyzer'
version = '1.0-SNAPSHOT'

application {
    mainClass = 'Main'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

// Ensure source files are read as UTF-8 so Unicode characters in comments
// and string literals are handled correctly on all platforms.
compileJava.options.encoding = 'UTF-8'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.code.gson:gson:2.10.1'
}
