plugins {
    id 'java'
    id 'application'
}

group = 'com.stockanalyzer'
version = '1.0-SNAPSHOT'

application {
    mainClass = 'Main'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.code.gson:gson:2.10.1'
}
