name: MobilePortStock
options:
  bundleIdPrefix: com.mobileportstock
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"      # iPhone + iPad
    SUPPORTS_MAC_DESIGNED_FOR_IPAD: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  MobilePortStock:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: MobilePortStock
        excludes:
          - "**/*.md"

    resources:
      - path: MobilePortStock/Resources/Assets.xcassets

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mobileportstock.app
        INFOPLIST_FILE: MobilePortStock/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        # Allow App Transport Security for Yahoo Finance (HTTP redirects)
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

    entitlements:
      path: MobilePortStock/MobilePortStock.entitlements
      properties:
        com.apple.security.network.client: true

  MobilePortStockTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: MobilePortStockTests

    dependencies:
      - target: MobilePortStock

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mobileportstock.tests

  MobilePortStockUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: MobilePortStockUITests

    dependencies:
      - target: MobilePortStock

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mobileportstock.uitests
        TEST_TARGET_NAME: MobilePortStock

schemes:
  MobilePortStock:
    build:
      targets:
        MobilePortStock: all
        MobilePortStockTests: [test]
        MobilePortStockUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MobilePortStockTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
